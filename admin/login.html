<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF8F4" />
  <title>Admin Sign In — EL-NOVIK</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/webp" href="/assets/images/https://res.cloudinary.com/dz9p9tnpe/image/upload/f_auto,q_auto,w_120,c_limit/v1780070580/El_novik_logo_ok1ich.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin-body">

  <main class="auth-shell">
    <div class="auth-card">

      <a href="/" class="auth-brand">
        <img src="/assets/images/https://res.cloudinary.com/dz9p9tnpe/image/upload/f_auto,q_auto,w_120,c_limit/v1780070580/El_novik_logo_ok1ich.webp" alt="" class="auth-brand-mark" />
        <span class="auth-brand-name">EL-NOVIK</span>
      </a>

      <header class="auth-head">
        <span class="eyebrow">Restricted Access</span>
        <h1 class="auth-title">Admin Sign In</h1>
        <p class="auth-lede">Enter your credentials to manage products and gallery.</p>
      </header>

      <form class="auth-form" id="loginForm" novalidate>

        <div class="form-field">
          <label for="auth-username" class="form-label">Username</label>
          <input
            type="text"
            id="auth-username"
            name="username"
            class="form-input"
            placeholder="Your admin username"
            required
            autocomplete="username"
            autofocus
          />
        </div>

        <div class="form-field">
          <label for="auth-password" class="form-label">Password</label>
          <div class="auth-password-wrap">
            <input
              type="password"
              id="auth-password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <button type="button" class="auth-password-toggle" id="togglePassword" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="auth-error" id="authError" hidden></div>

        <button type="submit" class="btn btn-primary btn-full auth-submit" id="loginSubmit">
          <span class="btn-label">Sign In</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M5 12h14M13 5l7 7-7 7"/>
          </svg>
        </button>

      </form>

      <footer class="auth-foot">
        <a href="/" class="auth-back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to website
        </a>
      </footer>

    </div>
  </main>

  <script src="/admin/admin.js" defer></script>
</body>
</html>
